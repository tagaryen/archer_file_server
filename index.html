<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ARCHER-FILE</title>
    <link rel = "icon" href = "/favicon.ico" type = "image/x-icon">
</head>
<body>
<div class="File">
    <div class="file-head">
        <div class="file-title">文件列表</div>
        <div class="file-upload">
            <button class="file-btn" onclick="showFileUpload()">文件上传</button>
            <div id="modal-file-overlay" class="modal-file-overlay">
            <div class="modal-file-content">
                <div class="modal-file-header">
                    <h3>文件上传</h3>
                    <button onclick="closeFileUpload()" class="close-btn">&times;</button>
                </div>
                <div id='file-upload-dropzone' class="file-upload-dropzone">
                    <div class="file-upload-dropzone-content">
                        <svg class="upload-icon" viewBox="0 0 24 24">
                        <path d="M19,13H13V19H11V13H5V11H11V5H13V11H19V13Z" />
                        </svg>
                        <p>拖拽文件到此处或点击选择文件</p>
                        <input type="file" id="file-input" onchange="onFileChange(event)" class="file-input" multiple>
                        <button onclick="triggerFileInput()" class="select-btn">选择文件</button>
                    </div>
                </div>
                <div class="file-data" id='file-data'>
                    <div class="file-info">
                        <span class="file-name" id="upload-file-name"></span>
                        <span class="file-size" id="upload-file-size"></span>
                    </div>
                    <button onclick="removeFile()" id='remove-btn' class="remove-btn">&times;</button>
                </div>
                <div id='file-progress-area' style="text-align: center; min-height: 21px; width: calc(100% - 72px);margin: 0px 36px ;">
                    <div style="width: calc(100% - 32px); text-align: left; position: relative; line-height: 20px; margin-right: 6px;">
                        <div id='file-progress' style="height: 10px; background-color: #409eff; border-radius: 6px; margin-top: 6px;"></div>
                    </div>
                    <div style="width: 38px; line-height: 20px;" id="upload-percentage"></div>
                </div>
                <div class="modal-file-footer" id = 'modal-file-footer'>
                <button onclick="closeFileUpload()" class="cancel-btn">取消</button>
                <button onclick="uploadFile()" class="upload-btn" id = 'upload-btn'>上传</button>
                </div>
            </div>
            </div>
        </div>
    </div>

    <div class = "file-area" id="file-list-area">
        <div class="list-title">
            <label class="filename title-content">名称</label>
            <label class="filesize title-content">大小</label>
            <label class="filetime title-content">时间</label>
            <!-- <label class="fileaction title-content">操作</label> -->
        </div>
        <div class="file-list" id="file-list"></div>
        <div class="file-page" id="file-page">
        <button 
            class = "file-page-btn" id="file-page-btn-1"
            onclick="prevPage()" 
            onmouseover="pageMouseover(1)"
            onmouseout="pageMouseout()">上一页</button>
        <span id="page-desc"></span>
        <button 
            class = "file-page-btn" id="file-page-btn-2"
            onclick="nextPage()" 
            onmouseover="pageMouseover(2)"
            onmouseout="pageMouseout()">下一页</button>
        </div>
    </div>
</div>

<script type="text/javascript">

const global = {
    fileUploadShow: false,
    file: null,
    percentage: 0,
    uploadText: '上传',
    total: 0,
    pageNum: 1
}

//文件上传拖动初始化
function fileuploadDropAreaInit() {
    let dropArea = document.getElementById('file-upload-dropzone');  
    dropArea.style.display = 'block';

    let fileInput = document.getElementById('file-input');  
  
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {  
        dropArea.addEventListener(eventName, (e) => {
            e.preventDefault();  
            e.stopPropagation();  
        }, false);  
    });  
  
    // 高亮效果  
    ['dragenter', 'dragover'].forEach(eventName => {  
      dropArea.addEventListener(eventName, () => {dropArea.classList.add('drag-over')}, false);  
    });  
  
    ['dragleave', 'drop'].forEach(eventName => {  
      dropArea.addEventListener(eventName, () => {dropArea.classList.remove('drag-over')}, false);  
    });  
  
    dropArea.addEventListener('drop', (e) => {  
        let dt = e.dataTransfer;  
        let files = dt.files;  
        if (files.length === 0) return;  
        addFile(files[0]);  
    }, false);

    let fileData = document.getElementById('file-data');  
    fileData.style.display = 'none';
    
    let removeBtn = document.getElementById('remove-btn');  
    removeBtn.disabled = false;
    
    let fileProgressArea = document.getElementById('file-progress-area');  
    fileProgressArea.style.display = 'none';
    
    let fileProgress = document.getElementById('file-progress');  
    fileProgress.style.width = '0%';

    let uploadPercentage = document.getElementById('upload-percentage');  
    uploadPercentage.innerHTML = "0%"

    
    let fileFooter = document.getElementById('modal-file-footer');  
    fileFooter.style.display = 'none';
}

function showFileUpload() {
    fileuploadDropAreaInit();

    let fileUpload = document.getElementById('modal-file-overlay');
    fileUpload.style.display = 'flex';
}

function closeFileUpload() {
    let fileUpload = document.getElementById('modal-file-overlay');
    fileUpload.style.display = 'none';
}

function addFile(file) {
    if(!file) {
        console.log("addFile file 为空");
        return;
    }
    global.file = file;
    
    let fileFooter = document.getElementById('modal-file-footer');  
    fileFooter.style.display = 'flex';
    
    let dropArea = document.getElementById('file-upload-dropzone');  
    dropArea.style.display = 'none';

    let fileData = document.getElementById('file-data');  
    fileData.style.display = 'flex';
    

    let uploadFileName = document.getElementById('upload-file-name');  
    let uploadFileSize = document.getElementById('upload-file-size');      
    uploadFileName.innerHTML = global.file?global.file.name:"" ; 
    uploadFileSize.innerHTML = formatFileSize(global.file?global.file.size:0);

    
    let uploadBtn = document.getElementById('upload-btn');  
    uploadBtn.innerHTML = "上传"
    uploadBtn.disabled = false;

}

function removeFile() {
    global.file = null;
    fileuploadDropAreaInit();
}

function onFileChange(e) {
    addFile(e.target.files[0])
}

function triggerFileInput() {
    let fileInput = document.getElementById('file-input');
    fileInput.click();  
}

function formatFileSize(bytes) {
    if (bytes === 0) return '0 Bytes'
    const k = 1024
    const sizes = ['Bytes', 'KB', 'MB', 'GB']
    const i = Math.floor(Math.log(bytes) / Math.log(k))
    return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i]
}


function getSize(size) {
    if(!size || isNaN(size)) {
        return "0B"
    }
    if(size < 1024) {
        return size + "B";
    }
    let t = "KB";
    if(size < 1024 * 1024) {
        size = size / 1024;
    } else if (size < 1024 * 1024 * 1024) {
        size = size / (1024*1024);
        t = "MB";
    } else if (size < 1024 * 1024 * 1024 * 1024) {
        size = size / (1024*1024*1204);
        t = "GB";
    }
    if(size !== (size | 0)) {
        size = size.toFixed(2);
    }
    return size + t;
}


function refreshFileList(pageNum) {
    
    let data = {total: 0, pageNum: 1, files: []};
    
    try {
        let xhr = new XMLHttpRequest();  
        xhr.open('GET', '/fs/open-api/v1/list?pageNum='+pageNum, false);  
        xhr.send(null); 
        if(xhr.status === 200) {
            let res = JSON.parse(xhr.responseText);
            if(res.success && res.data) {
                data = res.data;
            }
        }
    } catch(err) {
        console.log(err);
    }

    let fileList = document.getElementById('file-list');  
    let html = "";
    for(let f of data.files) {
        let size = getSize(f.size);
        html += '<div class="list-content">';
        html += '<label class="filename item-content" >';
        html += '<a href="/fs/open-api/v1/download?filename='+f.filename+'" target="_blank">'+f.filename+'</a>';
        html += '</label >';
        html += '<label class="filesize item-content">'+size+'</label>';
        html += '<label class="filetime item-content">'+f.time+'</label>';
        html += '</div>';
        // html += '<label class="filedelete item-content" onclick="deleteFileByName(item.name)">删除</label>';
    }
    fileList.innerHTML = html;

    global.pageNum = data.pageNum;
    global.total = Math.ceil(data.total / 10)
    
    let filePage = document.getElementById('file-page'); 
    if(global.total === 0) {
        filePage.classList.add("file-page-unable");
    }

    let pageBtn1 = document.getElementById('file-page-btn-1'); 
    let pageBtn2 = document.getElementById('file-page-btn-2');
    if(global.pageNum <= 1) {
        pageBtn1.disabled = true;
    } else {
        pageBtn1.disabled = false;
    }
    if(global.pageNum >= global.total) {
        pageBtn2.disabled = true;
    } else {
        pageBtn2.disabled = false;
    }
    
    let pageDesc = document.getElementById('page-desc');
    pageDesc.innerHTML = `第 ${global.pageNum} 页，共 ${global.total} 页`
}

function uploadFile() {  
    global.percentage = 0;

    if(!global.file) {
        console.log("未选择文件");
        return ;
    }

    let uploadBtn = document.getElementById('upload-btn');  
    uploadBtn.innerHTML = "上传中"
    uploadBtn.disabled = true;

    let formData = new FormData();  
    formData.append('file', global.file);  

    let fileData = document.getElementById('file-data');  
    fileData.style.display = 'flex';

    let removeBtn = document.getElementById('remove-btn');  
    removeBtn.disabled = true;

    let fileProgressArea = document.getElementById('file-progress-area');  
    fileProgressArea.style.display = 'flex';

    let uploadPercentage = document.getElementById('upload-percentage');  
    let fileProgress = document.getElementById('file-progress');  

    let xhr = new XMLHttpRequest();  
    // 监听上传进度  
    xhr.upload.addEventListener('progress', function(event) { 
        if (event.lengthComputable) {  
            let percentComplete = Math.ceil((event.loaded / event.total) * 100);  
            fileProgress.style.width = percentComplete + '%';
            uploadPercentage.innerHTML = percentComplete===0?"":(percentComplete+"%")
        }  
    }, false);  
    
    xhr.addEventListener('load', function() { 
        fileProgress.style.width = '100%';
        let uploadArea = document.getElementById('modal-file-overlay')
        uploadArea.style.display = 'none';

        refreshFileList(global.pageNum);
    });  
    
    xhr.addEventListener('error', function() { 
        let uploadArea = document.getElementById('modal-file-overlay')
        uploadArea.style.display = 'none';
    }); 
    // 发送请求  
    xhr.open('POST', '/fs/open-api/v1/upload?filename='+global.file.name, true);

    xhr.send(formData); 
}  


function pageMouseover(type) {
    let pageBtn1 = document.getElementById('file-page-btn-1'); 
    let pageBtn2 = document.getElementById('file-page-btn-2'); 
    if(type === 1 && global.pageNum > 1) {
        pageBtn1.classList.add('button-hover');
    }
    if(type === 2 && global.pageNum < global.total) {
        pageBtn2.classList.add('button-hover');
    }
}
function pageMouseout() {
    let pageBtn1 = document.getElementById('file-page-btn-1'); 
    let pageBtn2 = document.getElementById('file-page-btn-2'); 
    pageBtn1.classList.remove('button-hover');
    pageBtn1.classList.remove('button-hover');
}

function prevPage() {
    if (global.pageNum > 1) {
        refreshFileList(global.pageNum-1);
    }
}
function nextPage() {
    if (global.pageNum < global.total) {
        refreshFileList(global.pageNum+1);
    }
}

window.global = global;
window.onload = (e) => {
    refreshFileList(1);
};
</script>
